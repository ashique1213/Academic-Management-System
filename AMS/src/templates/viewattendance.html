{% extends 'hodindex.html' %}
{% block title %}Attendance{% endblock %}
{% block body %}

<!-- Page Header -->
<div class="mb-6">
    <h2 class="text-2xl font-bold text-slate-900">Mark Attendance</h2>
    <p class="text-sm text-slate-500 mt-1">Record daily attendance for students.</p>
</div>

<!-- Filters & Date Picker -->
<div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 mb-6">
    <form method="post" action="viewattendance1" class="flex flex-col sm:flex-row gap-4 items-end">
        <div class="flex-1">
            <label class="block text-sm font-medium text-slate-700 mb-1">Date</label>
            <input type="date" name="date" class="block w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" value="2023-10-15">
        </div>
        <div class="flex-1">
            <label class="block text-sm font-medium text-slate-700 mb-1">Semester / Class</label>
            <select name="select" class="block w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                <option value="1">Semester 1</option>
                <option value="2">Semester 2</option>
                <option value="3">Semester 3</option>
                <option value="4">Semester 4</option>
                <option value="5">Semester 5</option>
                <option value="6">Semester 6</option>
            </select>
        </div>
        <div>
            <button type="submit" class="bg-slate-900 hover:bg-slate-800 text-white rounded-lg px-6 py-2 text-sm font-medium transition duration-150">
                Load Students
            </button>
        </div>
    </form>
</div>

<!-- Attendance Form -->
<form action="#" method="post">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden relative">
        
        <!-- Summary Bar -->
        <div class="bg-slate-50 border-b border-slate-200 p-4 flex items-center justify-between">
            <div class="flex items-center space-x-6">
                <div class="flex items-center">
                    <span class="w-3 h-3 rounded-full bg-emerald-500 mr-2"></span>
                    <span class="text-sm font-medium text-slate-700">Present: <span class="text-slate-900 font-bold" id="count-present">0</span></span>
                </div>
                <div class="flex items-center">
                    <span class="w-3 h-3 rounded-full bg-rose-500 mr-2"></span>
                    <span class="text-sm font-medium text-slate-700">Absent: <span class="text-slate-900 font-bold" id="count-absent">0</span></span>
                </div>
                <div class="flex items-center">
                    <span class="w-3 h-3 rounded-full bg-amber-500 mr-2"></span>
                    <span class="text-sm font-medium text-slate-700">Late: <span class="text-slate-900 font-bold" id="count-late">0</span></span>
                </div>
            </div>
            <button type="button" class="text-sm text-blue-600 font-medium hover:text-blue-700" onclick="markAllPresent()">
                Mark All Present
            </button>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr>
                        <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider border-b border-slate-200">Student Name</th>
                        <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider border-b border-slate-200">History</th>
                        <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider border-b border-slate-200 text-right">Status</th>
                    </tr>
                </thead>
                
                <tbody class="divide-y divide-slate-100">
                    {% for i in val %}
                    <tr class="hover:bg-slate-50 transition duration-150 attendance-row">
                        <td class="px-6 py-4">
                            <p class="font-medium text-slate-900">{{i['name']}}</p>
                        </td>
                        <td class="px-6 py-4">
                            <span class="text-xs text-slate-500">{{i['per']}}% Attendance</span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <div class="inline-flex rounded-lg border border-slate-200 p-1 bg-slate-50">
                                <label class="cursor-pointer">
                                    <input type="radio" name="att_{{loop.index}}" value="present" class="peer sr-only">
                                    <div class="px-3 py-1.5 rounded-md text-xs font-medium text-slate-500 peer-checked:bg-emerald-500 peer-checked:text-white transition-colors">
                                        Present
                                    </div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="att_{{loop.index}}" value="absent" class="peer sr-only">
                                    <div class="px-3 py-1.5 rounded-md text-xs font-medium text-slate-500 peer-checked:bg-rose-500 peer-checked:text-white transition-colors">
                                        Absent
                                    </div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="att_{{loop.index}}" value="late" class="peer sr-only">
                                    <div class="px-3 py-1.5 rounded-md text-xs font-medium text-slate-500 peer-checked:bg-amber-500 peer-checked:text-white transition-colors">
                                        Late
                                    </div>
                                </label>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>

        <div class="p-6 bg-slate-50 border-t border-slate-200 flex justify-end">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white rounded-lg px-8 py-2.5 font-medium transition duration-150 shadow-sm flex items-center">
                <i class="bi bi-check2-circle mr-2 text-lg"></i> Submit Attendance
            </button>
        </div>
    </div>
</form>

<script>
    function updateCounts() {
        let present = 0, absent = 0, late = 0;
        document.querySelectorAll('input[type="radio"]:checked').forEach(radio => {
            if(radio.value === 'present') present++;
            if(radio.value === 'absent') absent++;
            if(radio.value === 'late') late++;
        });
        document.getElementById('count-present').innerText = present;
        document.getElementById('count-absent').innerText = absent;
        document.getElementById('count-late').innerText = late;
    }

    function markAllPresent() {
        document.querySelectorAll('.attendance-row').forEach(row => {
            const presentRadio = row.querySelector('input[value="present"]');
            if(presentRadio) presentRadio.checked = true;
        });
        updateCounts();
    }

    document.addEventListener('change', updateCounts);
    document.addEventListener('DOMContentLoaded', updateCounts);
</script>

{% endblock %}
