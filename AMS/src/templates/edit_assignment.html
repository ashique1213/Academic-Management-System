{% extends 'hodindex.html' %}
{% block title %}Edit Assignment{% endblock %}
{% block body %}
<!-- Overlay -->
<div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40 transition-opacity"></div>

<!-- Modal -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-full">
        
        <!-- Header -->
        <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-white shrink-0">
            <div>
                <h3 class="text-lg font-bold text-slate-900">Edit Assignment</h3>
                <p class="text-xs text-slate-500 mt-0.5">Modify assignment details.</p>
            </div>
            <a href="/viewassignments" class="text-slate-400 hover:text-slate-600 transition-colors">
                <i class="bi bi-x-lg text-lg"></i>
            </a>
        </div>

        <!-- Form Body -->
        <div class="p-6 overflow-y-auto">
            <form action="/editassignment" method="post" class="space-y-5">
                
                <!-- Topic -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Topic <span class="text-rose-500">*</span></label>
                    <input type="text" name="topic" value="{{val['topic']}}" required 
                           class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-slate-900 text-sm focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none" 
                           placeholder="e.g. Thermodynamics Chapter 1">
                </div>

                <!-- Teacher -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Teacher <span class="text-rose-500">*</span></label>
                    <div class="relative">
                        <select name="staf_id" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-slate-900 text-sm focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none appearance-none">
                            <option value="">Select a Teacher</option>
                            {% for t in teachers %}
                            <option value="{{t['login_id']}}" {% if t['login_id'] == val['staf_id'] %}selected{% endif %}>{{t['name']}} ({{t['designation']}})</option>
                            {% endfor %}
                        </select>
                        <i class="bi bi-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                    </div>
                </div>

                <!-- Last Date -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Last Date (Deadline) <span class="text-rose-500">*</span></label>
                    <input type="date" name="last_date" value="{{val['last date']}}" required 
                           class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-slate-900 text-sm focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none">
                </div>
                
                <!-- Description -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Description <span class="text-rose-500">*</span></label>
                    <textarea name="description" rows="3" required
                           class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-slate-900 text-sm focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none resize-none" 
                           placeholder="Enter details...">{{val['description']}}</textarea>
                </div>

                <!-- Footer Actions -->
                <div class="pt-4 mt-2 border-t border-slate-100 flex items-center justify-end gap-3">
                    <a href="/viewassignments" class="px-5 py-2.5 text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-xl transition duration-150 ease-in-out">
                        Cancel
                    </a>
                    <button type="submit" class="px-5 py-2.5 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow-sm hover:shadow transition duration-150 ease-in-out flex items-center">
                        <i class="bi bi-check2-circle mr-2"></i> Save
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
