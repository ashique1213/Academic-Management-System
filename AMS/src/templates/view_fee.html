{% extends 'hodindex.html' %}
{% block body %}
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Untitled Document</title>
</head>

<body>
<form id="form1" name="form1" method="post" action="addfees#about">
  <div class="bg-white/90 backdrop-blur-2xl rounded-3xl shadow-[0_10px_40px_rgb(0,0,0,0.06)] border border-white/60 mb-6 overflow-hidden hover:shadow-[0_15px_50px_rgb(0,0,0,0.1)] transition-all duration-500 relative">
<div class="overflow-x-auto p-4">
<table class="w-full text-left text-[12px] text-slate-600 dataTable">
    <tr>
      <th class="px-5 py-4 bg-slate-900 text-slate-100 font-bold border-b border-slate-800 tracking-widest text-[12px] shadow-inner">Title</th>
      <th class="px-5 py-4 bg-slate-900 text-slate-100 font-bold border-b border-slate-800 tracking-widest text-[12px] shadow-inner">Semester</th>
      <th class="px-5 py-4 bg-slate-900 text-slate-100 font-bold border-b border-slate-800 tracking-widest text-[12px] shadow-inner">Amount</th>
      <th class="px-5 py-4 bg-slate-900 text-slate-100 font-bold border-b border-slate-800 tracking-widest text-[12px] shadow-inner">Last Date</th>
      <th class="px-5 py-4 bg-slate-900 text-slate-100 font-bold border-b border-slate-800 tracking-widest text-[12px] shadow-inner">Description</th>
      <th class="px-5 py-4 bg-slate-900 text-slate-100 font-bold border-b border-slate-800 tracking-widest text-[12px] shadow-inner">&nbsp;</th>
    </tr>
    {% for i in val %}
    <tr>
      <td class="px-5 py-4 border-b border-slate-100/60 text-slate-600 font-medium">{{i['title']}}</td>
      <td class="px-5 py-4 border-b border-slate-100/60 text-slate-600 font-medium">{{i['semester']}}</td>
      <td class="px-5 py-4 border-b border-slate-100/60 text-slate-600 font-medium">{{i['amount']}}</td>
      <td class="px-5 py-4 border-b border-slate-100/60 text-slate-600 font-medium">{{i['lastdate']}}</td>
      <td class="px-5 py-4 border-b border-slate-100/60 text-slate-600 font-medium">{{i['description']}}</td>
      <td class="px-5 py-4 border-b border-slate-100/60 text-slate-600 font-medium"><p><a href="editfee?id={{i['f_id']}}#about" class="inline-flex items-center px-4 py-2 text-[11px] font-bold text-white bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 shadow-md shadow-indigo-500/30 rounded-lg hover:-translate-y-0.5 hover:shadow-lg transition-all duration-300 border-0 tracking-wide">Edit </a>&nbsp;&nbsp;
      <a href="deletefee?id={{i['f_id']}}#about" class="inline-flex items-center px-4 py-2 text-[11px] font-bold text-white bg-gradient-to-r from-rose-500 to-pink-600 hover:from-rose-600 hover:to-pink-700 shadow-md shadow-rose-500/30 rounded-lg hover:-translate-y-0.5 hover:shadow-lg transition-all duration-300 border-0 tracking-wide">Delete</a></p></td>
    </tr>
    {% endfor %}
  </table>
<div class="mt-6 flex justify-end px-4 pb-4"><input type="submit" class="inline-flex justify-center items-center px-5 py-2 rounded-xl shadow-xl shadow-indigo-500/30 text-[12px] font-bold text-white bg-gradient-to-r from-indigo-500 via-purple-500 to-indigo-600 hover:from-indigo-600 hover:via-purple-600 hover:to-indigo-700 hover:-translate-y-1 hover:shadow-2xl transition-all duration-500 w-full md:w-auto border-0 tracking-wider" name="Submit" value="add" /></div>
</div>
</div>
</form>
</body>
  
<!--</html>-->
{% endblock %}
