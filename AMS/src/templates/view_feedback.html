{% extends 'hodindex.html' %}
{% block body %}
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Untitled Document</title>
</head>

<body>
<form id="form1" name="form1" method="post" action="viewfeedback1">
  <div class="bg-white/90 backdrop-blur-2xl rounded-3xl shadow-[0_10px_40px_rgb(0,0,0,0.06)] border border-white/60 mb-6 overflow-hidden hover:shadow-[0_15px_50px_rgb(0,0,0,0.1)] transition-all duration-500 relative">
<div class="overflow-x-auto p-4">
<table class="w-full text-left text-[12px] text-slate-600 dataTable">
    <tr>
      <td class="px-5 py-4 border-b border-slate-100/60 text-slate-600 font-medium">staffname</td>
      <td class="px-5 py-4 border-b border-slate-100/60 text-slate-600 font-medium"><select name="select">
        {%for i in val %}
        <option value="{{i['login_id']}}">{{i['name']}}</option>
        {% endfor %}
      </select>
         <td colspan="2"><label>
        <div align="center">
          <input type="submit" class="inline-flex justify-center items-center px-5 py-2 rounded-xl shadow-xl shadow-indigo-500/30 text-[12px] font-bold text-white bg-gradient-to-r from-indigo-500 via-purple-500 to-indigo-600 hover:from-indigo-600 hover:via-purple-600 hover:to-indigo-700 hover:-translate-y-1 hover:shadow-2xl transition-all duration-500 w-full md:w-auto border-0 tracking-wider" name="Submit" value="SEARCH" />
          </div>
      </label></td></td>
    </tr>
    <tr>
      <th class="px-5 py-4 bg-slate-900 text-slate-100 font-bold border-b border-slate-800 tracking-widest text-[12px] shadow-inner">feedback</th>
      <th class="px-5 py-4 bg-slate-900 text-slate-100 font-bold border-b border-slate-800 tracking-widest text-[12px] shadow-inner">op1</th>
      <th class="px-5 py-4 bg-slate-900 text-slate-100 font-bold border-b border-slate-800 tracking-widest text-[12px] shadow-inner">op2</th>
      <th class="px-5 py-4 bg-slate-900 text-slate-100 font-bold border-b border-slate-800 tracking-widest text-[12px] shadow-inner">op3</th>
      <th class="px-5 py-4 bg-slate-900 text-slate-100 font-bold border-b border-slate-800 tracking-widest text-[12px] shadow-inner">op4</th>
      <th class="px-5 py-4 bg-slate-900 text-slate-100 font-bold border-b border-slate-800 tracking-widest text-[12px] shadow-inner">answer</th>
      <th class="px-5 py-4 bg-slate-900 text-slate-100 font-bold border-b border-slate-800 tracking-widest text-[12px] shadow-inner">date</th>
      <th class="px-5 py-4 bg-slate-900 text-slate-100 font-bold border-b border-slate-800 tracking-widest text-[12px] shadow-inner"></th>
    </tr>
    {% for i in v %}
    <tr>
      <td class="px-5 py-4 border-b border-slate-100/60 text-slate-600 font-medium">{{i['feed_questions']}}</td>
      <td class="px-5 py-4 border-b border-slate-100/60 text-slate-600 font-medium">{{i['op1']}}</td>
      <td class="px-5 py-4 border-b border-slate-100/60 text-slate-600 font-medium">{{i['op2']}}</td>
      <td class="px-5 py-4 border-b border-slate-100/60 text-slate-600 font-medium">{{i['op3']}}</td>
      <td class="px-5 py-4 border-b border-slate-100/60 text-slate-600 font-medium">{{i['op4']}}</td>
      <td class="px-5 py-4 border-b border-slate-100/60 text-slate-600 font-medium">{{i['ans']}}</td>
      <td class="px-5 py-4 border-b border-slate-100/60 text-slate-600 font-medium">{{i['date']}}</td>
      <td class="px-5 py-4 border-b border-slate-100/60 text-slate-600 font-medium"><a href="viewresponsefeed?id={{i['feed_id']}}">view response</a></td>
    </tr>
    {% endfor %}
  </table>
</div>
</div>
</form>
</body>

<!--</html>-->
{% endblock %}
