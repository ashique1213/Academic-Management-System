{% extends 'hodindex.html' %}
{% block title %}Add Teacher{% endblock %}
{% block body %}

<!-- Backdrop / Modal Container -->
<div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 sm:p-6 overflow-y-auto">
    
    <!-- Modal Card -->
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl flex flex-col max-h-full overflow-hidden animate-[fadeIn_0.2s_ease-out]">
        
        <!-- Header -->
        <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between bg-slate-50">
            <div class="flex items-center">
                <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 mr-3">
                    <i class="bi bi-person-plus-fill"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-900">Add New Teacher</h3>
            </div>
            <a href="/viewteacher" class="text-slate-400 hover:text-slate-600 transition-colors">
                <i class="bi bi-x-lg text-lg"></i>
            </a>
        </div>

        <!-- Body (Scrollable) -->
        <div class="p-6 overflow-y-auto">
            <form method="post" enctype="multipart/form-data" action="addteacher1" id="addTeacherForm">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <!-- Name -->
                    <div class="col-span-1 md:col-span-2">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Full Name <span class="text-rose-500">*</span></label>
                        <input type="text" name="textfield" required pattern="[A-Z a-z.]{3,25}" class="block w-full border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-900 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-shadow" placeholder="e.g. Dr. Sarah Jenkins">
                    </div>

                    <!-- Designation -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Designation <span class="text-rose-500">*</span></label>
                        <input type="text" name="textfield3" required class="block w-full border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-900 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-shadow" placeholder="e.g. Associate Professor">
                    </div>

                    <!-- Qualification -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Qualification <span class="text-rose-500">*</span></label>
                        <input type="text" name="textfield2" required class="block w-full border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-900 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-shadow" placeholder="e.g. Ph.D. in Computer Science">
                    </div>

                    <!-- Gender -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Gender <span class="text-rose-500">*</span></label>
                        <div class="flex items-center space-x-4">
                            <label class="inline-flex items-center">
                                <input type="radio" name="radiobutton" value="male" class="w-4 h-4 text-blue-600 border-slate-300 focus:ring-blue-500" checked>
                                <span class="ml-2 text-sm text-slate-700">Male</span>
                            </label>
                            <label class="inline-flex items-center">
                                <input type="radio" name="radiobutton" value="female" class="w-4 h-4 text-blue-600 border-slate-300 focus:ring-blue-500">
                                <span class="ml-2 text-sm text-slate-700">Female</span>
                            </label>
                        </div>
                    </div>

                    <!-- Age -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Age <span class="text-rose-500">*</span></label>
                        <input type="number" name="textfield32" required min="18" max="100" class="block w-full border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-900 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-shadow" placeholder="e.g. 35">
                    </div>

                    <!-- Phone -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Phone Number <span class="text-rose-500">*</span></label>
                        <input type="tel" name="textfield33" required pattern="[0-9]{10}" class="block w-full border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-900 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-shadow" placeholder="10-digit mobile number">
                    </div>

                    <!-- Photo -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Profile Photo <span class="text-rose-500">*</span></label>
                        <input type="file" name="file" required class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-medium file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 focus:outline-none">
                    </div>

                    <div class="col-span-1 md:col-span-2 mt-2 pt-4 border-t border-slate-200">
                        <h4 class="text-sm font-bold text-slate-900 mb-4">Account Details</h4>
                    </div>

                    <!-- Username -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Username <span class="text-rose-500">*</span></label>
                        <input type="text" name="textfield4" required class="block w-full border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-900 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-shadow" placeholder="Login username">
                    </div>

                    <!-- Password -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Password <span class="text-rose-500">*</span></label>
                        <input type="password" name="textfield5" required class="block w-full border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-900 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-shadow" placeholder="Login password">
                    </div>

                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="px-6 py-4 border-t border-slate-200 bg-slate-50 flex items-center justify-end space-x-3">
            <a href="/viewteacher" class="px-4 py-2 border border-slate-300 rounded-lg text-sm font-medium text-slate-700 bg-white hover:bg-slate-50 transition-colors">
                Cancel
            </a>
            <button type="submit" form="addTeacherForm" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg shadow-sm transition-colors">
                Save Teacher
            </button>
        </div>

    </div>
</div>

{% endblock %}
