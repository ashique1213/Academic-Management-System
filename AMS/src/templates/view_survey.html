{% extends 'hodindex.html' %}
{% block body %}
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Untitled Document</title>
</head>

<body>
<form id="form1" name="form1" method="post" action="">
  <div class="bg-white/90 backdrop-blur-2xl rounded-3xl shadow-[0_10px_40px_rgb(0,0,0,0.06)] border border-white/60 mb-6 overflow-hidden hover:shadow-[0_15px_50px_rgb(0,0,0,0.1)] transition-all duration-500 relative">
<div class="overflow-x-auto p-4">
<table class="w-full text-left text-[12px] text-slate-600 dataTable">
    <tr>
      <th class="px-5 py-4 bg-slate-900 text-slate-100 font-bold border-b border-slate-800 tracking-widest text-[12px] shadow-inner">survey questions</th>
      <th class="px-5 py-4 bg-slate-900 text-slate-100 font-bold border-b border-slate-800 tracking-widest text-[12px] shadow-inner">op1</th>
      <th class="px-5 py-4 bg-slate-900 text-slate-100 font-bold border-b border-slate-800 tracking-widest text-[12px] shadow-inner">op2</th>
      <th class="px-5 py-4 bg-slate-900 text-slate-100 font-bold border-b border-slate-800 tracking-widest text-[12px] shadow-inner">op3</th>
      <th class="px-5 py-4 bg-slate-900 text-slate-100 font-bold border-b border-slate-800 tracking-widest text-[12px] shadow-inner">op4</th>
      <th class="px-5 py-4 bg-slate-900 text-slate-100 font-bold border-b border-slate-800 tracking-widest text-[12px] shadow-inner"></th>

    </tr>
    {% for i in val %}
    <tr>
      <td class="px-5 py-4 border-b border-slate-100/60 text-slate-600 font-medium">{{i['survey questions']}}</td>
      <td class="px-5 py-4 border-b border-slate-100/60 text-slate-600 font-medium">{{i['op1']}}</td>
      <td class="px-5 py-4 border-b border-slate-100/60 text-slate-600 font-medium">{{i['op2']}}</td>
      <td class="px-5 py-4 border-b border-slate-100/60 text-slate-600 font-medium">{{i['op3']}}</td>
      <td class="px-5 py-4 border-b border-slate-100/60 text-slate-600 font-medium">{{i['op4']}}</td>
      <td class="px-5 py-4 border-b border-slate-100/60 text-slate-600 font-medium"><a href="viewresponsesurvey?id={{i['sur_id']}}">view response</a></td>

    </tr>
    {% endfor %}

  </table>
</div>
</div>
</form>
</body>

<!--</html>-->
{% endblock %}
