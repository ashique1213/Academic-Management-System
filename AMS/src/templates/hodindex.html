<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Admin Dashboard | AMS</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Simple DataTables CSS -->
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@latest/dist/style.css" rel="stylesheet" type="text/css">
    
    <style type="text/tailwindcss">
        @layer utilities {
            .scrollbar-hide::-webkit-scrollbar { display: none; }
            .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        }
        
        /* DataTables overrides to match design system */
        .dataTable-table thead th {
            background-color: transparent !important;
            color: #64748b !important; /* slate-500 */
            font-weight: 600;
            padding: 1rem 1.5rem !important;
            border-bottom: 1px solid #e2e8f0 !important;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }
        .dataTable-table tbody td {
            padding: 1rem 1.5rem !important;
            border-bottom: 1px solid #f1f5f9 !important;
            color: #334155; /* slate-700 */
            font-size: 0.875rem;
        }
        .dataTable-table tbody tr {
            transition: all 0.15s ease-in-out;
        }
        .dataTable-table tbody tr:hover {
            background-color: #f8fafc !important; /* slate-50 */
        }
        .dataTable-wrapper {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0; /* slate-200 */
            overflow: hidden;
        }
        .dataTable-top, .dataTable-bottom {
            padding: 1rem 1.5rem !important;
            background-color: white;
        }
        .dataTable-top { border-bottom: 1px solid #f1f5f9; }
        .dataTable-bottom { border-top: 1px solid #f1f5f9; }
    </style>
</head>
<body class="bg-slate-100 font-sans antialiased text-slate-700 flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <nav class="w-64 bg-slate-900 flex flex-col hidden md:flex shrink-0 shadow-xl z-20 transition-all duration-300">
        <!-- Logo -->
        <div class="h-16 flex items-center px-6 bg-slate-900 border-b border-slate-800 shrink-0">
            <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center mr-3 shadow-lg shadow-blue-500/20">
                <i class="bi bi-mortarboard-fill text-white"></i>
            </div>
            <h3 class="text-xl font-bold text-white tracking-tight">AMS</h3>
        </div>
        
        <!-- Nav Links -->
        <div class="flex-1 overflow-y-auto scrollbar-hide py-6 px-4 space-y-6">
            
            <!-- Management -->
            <div>
                <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Management</p>
                <div class="space-y-1">
                    <a href="/hod" class="flex items-center px-3 py-2 text-sm font-medium rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition duration-150 ease-in-out {% if request.path == '/hod' %}bg-blue-600 text-white hover:bg-blue-600{% endif %}">
                        <i class="bi bi-grid-1x2-fill mr-3 text-lg opacity-75"></i> Dashboard
                    </a>
                    <a href="/viewteacher" class="flex items-center px-3 py-2 text-sm font-medium rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition duration-150 ease-in-out {% if 'teacher' in request.path %}bg-blue-600 text-white hover:bg-blue-600{% endif %}">
                        <i class="bi bi-person-workspace mr-3 text-lg opacity-75"></i> Teachers
                    </a>
                    <a href="/viewstudents" class="flex items-center px-3 py-2 text-sm font-medium rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition duration-150 ease-in-out {% if 'student' in request.path %}bg-blue-600 text-white hover:bg-blue-600{% endif %}">
                        <i class="bi bi-mortarboard mr-3 text-lg opacity-75"></i> Students
                    </a>
                    <a href="/viewsubject" class="flex items-center px-3 py-2 text-sm font-medium rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition duration-150 ease-in-out {% if 'subject' in request.path and 'assign' not in request.path %}bg-blue-600 text-white hover:bg-blue-600{% endif %}">
                        <i class="bi bi-journal-bookmark mr-3 text-lg opacity-75"></i> Subjects
                    </a>
                    <a href="/viewassignments" class="flex items-center px-3 py-2 text-sm font-medium rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition duration-150 ease-in-out {% if 'assignment' in request.path and 'assess' not in request.path %}bg-blue-600 text-white hover:bg-blue-600{% endif %}">
                        <i class="bi bi-journal-text mr-3 text-lg opacity-75"></i> Assignments
                    </a>

                    <a href="/viewassignsub" class="flex items-center px-3 py-2 text-sm font-medium rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition duration-150 ease-in-out {% if 'assignsub' in request.path %}bg-blue-600 text-white hover:bg-blue-600{% endif %}">
                        <i class="bi bi-diagram-2 mr-3 text-lg opacity-75"></i> Assign Subjects
                    </a>
                </div>
            </div>

            <!-- Academics -->
            <div>
                <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Academics</p>
                <div class="space-y-1">
                    <a href="/timetable" class="flex items-center px-3 py-2 text-sm font-medium rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition duration-150 ease-in-out {% if 'timetable' in request.path %}bg-blue-600 text-white hover:bg-blue-600{% endif %}">
                        <i class="bi bi-calendar3 mr-3 text-lg opacity-75"></i> Timetable
                    </a>
                    <a href="/viewattendance" class="flex items-center px-3 py-2 text-sm font-medium rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition duration-150 ease-in-out {% if 'attendance' in request.path %}bg-blue-600 text-white hover:bg-blue-600{% endif %}">
                        <i class="bi bi-person-check mr-3 text-lg opacity-75"></i> Attendance
                    </a>
                    <a href="/view_assessments" class="flex items-center px-3 py-2 text-sm font-medium rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition duration-150 ease-in-out {% if 'assessment' in request.path %}bg-blue-600 text-white hover:bg-blue-600{% endif %}">
                        <i class="bi bi-file-earmark-bar-graph mr-3 text-lg opacity-75"></i> Assessments
                    </a>
                </div>
            </div>

            <!-- Reports -->
            <div>
                <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Reports</p>
                <div class="space-y-1">
                    <a href="/view_results" class="flex items-center px-3 py-2 text-sm font-medium rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition duration-150 ease-in-out {% if 'result' in request.path %}bg-blue-600 text-white hover:bg-blue-600{% endif %}">
                        <i class="bi bi-award mr-3 text-lg opacity-75"></i> Results
                    </a>
                    <a href="/viewannouncement" class="flex items-center px-3 py-2 text-sm font-medium rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition duration-150 ease-in-out {% if 'announcement' in request.path %}bg-blue-600 text-white hover:bg-blue-600{% endif %}">
                        <i class="bi bi-megaphone mr-3 text-lg opacity-75"></i> Announcements
                    </a>
                </div>
            </div>

        </div>
        
        <!-- Sidebar Footer -->
        <div class="p-4 bg-slate-900 border-t border-slate-800 shrink-0">
            <div class="flex items-center justify-between">
                <div class="flex items-center min-w-0">
                    <img class="w-9 h-9 rounded-full bg-slate-800 border border-slate-700 shrink-0" src="https://ui-avatars.com/api/?name=Admin&background=2563eb&color=fff" alt="Admin avatar">
                    <div class="ml-3 truncate">
                        <p class="text-sm font-medium text-white truncate">Administrator</p>
                        <p class="text-xs text-slate-400 truncate">admin@ams.edu</p>
                    </div>
                </div>
                <a href="/logout" class="ml-2 text-slate-400 hover:text-white hover:bg-slate-800 p-2 rounded-lg transition duration-150 ease-in-out" title="Logout">
                    <i class="bi bi-box-arrow-right text-lg"></i>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content Wrapper -->
    <div class="flex-1 flex flex-col min-w-0 bg-slate-100 overflow-hidden">
        
        <!-- Topbar -->
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0 z-10 shadow-sm">
            
            <div class="flex items-center">
                <button class="md:hidden text-slate-500 hover:text-slate-700 mr-4">
                    <i class="bi bi-list text-2xl"></i>
                </button>
                <!-- Breadcrumbs & Title Block -->
                <div class="hidden sm:block">
                    <h1 class="text-xl font-bold text-slate-900">{% block title %}Admin Console{% endblock %}</h1>
                    <!-- Optional Breadcrumb could go here -->
                </div>
            </div>
            
            <div class="flex items-center gap-4 lg:gap-6">
                <!-- Search -->
                <div class="relative hidden md:block">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="bi bi-search text-slate-400"></i>
                    </div>
                    <input type="text" class="block w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg leading-5 bg-slate-50 placeholder-slate-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition duration-150 ease-in-out" placeholder="Search everywhere...">
                </div>

                <!-- Notifications -->
                <button class="relative p-2 text-slate-400 hover:text-slate-500 rounded-full hover:bg-slate-100 transition duration-150 ease-in-out">
                    <span class="absolute top-1.5 right-1.5 block h-2 w-2 rounded-full bg-rose-500 ring-2 ring-white"></span>
                    <i class="bi bi-bell text-xl"></i>
                </button>

                <!-- Topbar Avatar -->
                <div class="relative flex items-center border-l border-slate-200 pl-4 lg:pl-6">
                    <button class="flex items-center max-w-xs rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                        <img class="h-8 w-8 rounded-full" src="https://ui-avatars.com/api/?name=Admin&background=2563eb&color=fff" alt="">
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Page Content -->
        <main class="flex-1 overflow-y-auto p-4 md:p-6 relative">
            <div class="max-w-7xl mx-auto">
                {% block body %}
                {% endblock %}
            </div>
        </main>
        
    </div>

    <!-- Simple DataTables JS -->
    <script src="https://cdn.jsdelivr.net/npm/simple-datatables@latest" type="text/javascript"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const tables = document.querySelectorAll(".dataTable");
            tables.forEach(table => {
                if(table.classList.contains("dataTable-table")) return;
                try {
                    new simpleDatatables.DataTable(table, {
                        searchable: true,
                        fixedHeight: false,
                        perPage: 10,
                        classes: {
                            active: "bg-blue-50 text-blue-600 font-medium",
                            disabled: "opacity-50 cursor-not-allowed",
                            selector: "bg-white border border-slate-300 text-slate-700 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-2 transition duration-150 ease-in-out",
                            paginationList: "flex items-center space-x-1 mt-4 justify-end",
                            paginationListItem: "list-none",
                            paginationListItemLink: "px-3 py-1 bg-white border border-slate-300 text-slate-600 rounded-md hover:bg-slate-50 hover:text-slate-900 text-sm transition duration-150 ease-in-out",
                            input: "bg-white border border-slate-300 text-slate-700 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-2 w-64 transition duration-150 ease-in-out"
                        }
                    });
                } catch(e) { console.error("Error initializing simpleDatatables:", e); }
            });
        });
    </script>

<!-- Sidebar Active State Script -->
<script>
document.addEventListener("DOMContentLoaded", function() {
    const currentPath = window.location.pathname.toLowerCase();
    
    // Select all sidebar links
    const sidebarLinks = document.querySelectorAll('.w-64.bg-slate-900 a');
    
    // Remove active class from all links just to be sure
    sidebarLinks.forEach(link => {
        if(link.getAttribute('href') !== '/logout') {
            link.classList.remove('bg-blue-600', 'text-white');
        }
    });

    // Helper to check if link should be active
    const checkActive = (path, href) => {
        if (href === '/hod' && path === '/hod') return true;
        if (href !== '/hod' && href !== '/logout' && path.includes(href.toLowerCase())) return true;
        // Special mappings for add/edit routes
        if (path.includes('teacher') && href === '/viewteacher') return true;
        if (path.includes('student') && href === '/viewstudents') return true;
        if ((path.includes('subject') && !path.includes('assign')) && href === '/viewsubject') return true;
        if (path.includes('assignsub') && href === '/viewassignsub') return true;
        if (path.includes('timetable') && href === '/timetable') return true;
        if ((path.includes('attendance') || path.includes('att')) && href === '/viewattendance') return true;
        if (path.includes('anoucement') && href === '/viewannouncement') return true;
        return false;
    };

    
    // Preserve sidebar scroll position
    const sidebarScrollDiv = document.querySelector('.flex-1.overflow-y-auto');
    if (sidebarScrollDiv) {
        // Restore scroll position
        const savedScrollTop = sessionStorage.getItem('sidebarScrollTop');
        if (savedScrollTop) {
            sidebarScrollDiv.scrollTop = parseInt(savedScrollTop, 10);
        }
        
        // Save scroll position on scroll
        sidebarScrollDiv.addEventListener('scroll', function() {
            sessionStorage.setItem('sidebarScrollTop', sidebarScrollDiv.scrollTop);
        });
    }

    let foundActive = false;
    sidebarLinks.forEach(link => {
        const href = link.getAttribute('href').split('#')[0].toLowerCase();
        if (checkActive(currentPath, href)) {
            link.classList.add('bg-blue-600', 'text-white');
            foundActive = true;
        }
    });
});
</script>
</body>

</html>
