<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Login | Academic Management System</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-800 h-screen overflow-hidden">
    <div class="grid grid-cols-1 lg:grid-cols-2 h-full">
        <!-- Left Side: Branding/Hero -->
        <div class="hidden lg:flex flex-col justify-center px-16 lg:px-24 xl:px-32 relative bg-gradient-to-br from-blue-600 to-indigo-900 text-white overflow-hidden">
            <!-- Decorative circle -->
            <div class="absolute -bottom-32 -left-32 w-96 h-96 rounded-full bg-white/10 blur-3xl"></div>
            <div class="absolute -top-32 -right-32 w-96 h-96 rounded-full bg-indigo-500/20 blur-3xl"></div>
            
            <div class="relative z-10">
                <i class="bi bi-mortarboard-fill text-6xl mb-8 opacity-90 inline-block"></i>
                <h1 class="text-5xl xl:text-6xl font-bold tracking-tight mb-6 leading-tight">
                    Academic<br>Management<br>System
                </h1>
                <p class="text-xl text-blue-100 font-light max-w-md leading-relaxed">
                    Welcome to the next generation of academic management. Secure, fast, and beautifully designed.
                </p>
            </div>
            
            <div class="absolute bottom-12 left-16 lg:left-24 xl:left-32 z-10 flex items-center text-blue-200 text-[12px] font-medium tracking-wider uppercase">
                <i class="bi bi-shield-check text-xl mr-2"></i> Enterprise Grade Security
            </div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="flex flex-col justify-center items-center px-6 sm:px-12 relative">
            <div class="w-full max-w-md">
                <div class="text-center lg:text-left mb-10">
                    <h2 class="text-3xl font-bold text-slate-900 mb-3 tracking-tight">Welcome back</h2>
                    <p class="text-slate-500 text-[12px]">Please enter your credentials to continue.</p>
                </div>

                <form id="form1" name="form1" method="post" action="login_code" class="space-y-6">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="bi bi-person text-slate-400"></i>
                        </div>
                        <input type="text" name="textfield" required class="block w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-[12px] placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" placeholder="Username" />
                    </div>

                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="bi bi-lock text-slate-400"></i>
                        </div>
                        <input type="password" name="textfield2" required class="block w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl text-[12px] placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" placeholder="Password" />
                    </div>

                    <button type="submit" name="Submit" class="w-full flex justify-center items-center py-3.5 px-4 border border-transparent rounded-xl shadow-sm text-[12px] font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                        Sign In <i class="bi bi-arrow-right ml-2"></i>
                    </button>
                </form>

                <div class="mt-12 text-center text-[11px] text-slate-400 font-medium">
                    &copy; 2026 AMS Enterprise Edition
                </div>
            </div>
        </div>
    </div>
</body>
</html>
